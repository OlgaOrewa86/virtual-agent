name: CI Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # -------------------------
      # BACKEND
      # -------------------------
      - name: Regenerate backend lockfile (temporary)
        run: cd backend && npm install

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Lint backend
        run: cd backend && npm run lint

      - name: Run unit tests
        run: cd backend && npm run test:unit

      - name: Run integration tests
        run: cd backend && npm run test:integration

      - name: Run NLU tests
        run: cd backend && npm run test:nlu

      - name: Validate routing JSON
        run: cd backend && npm run validate:routing

      - name: Build backend
        run: cd backend && npm run build:backend


      # -------------------------
      # BACKEND HEALTH CHECK
      # -------------------------
      - name: Run backend health check
        env:
          PORT: 3000
          CI: "true"
        run: |
          cd backend
          node src/server.js &
          sleep 3
          curl -f http://localhost:3000/health

      # -------------------------
      # BACKEND LOGGING VALIDATION
      # -------------------------
      - name: Validate backend logging
        env:
          PORT: 3000
          CI: "true"
        run: |
          cd backend

          # 1. Start backend in CI mode
          node src/server.js &
          sleep 3

          # 2. Trigger a known error route
          curl -f http://localhost:3000/debug/force-error || true

          # 3. Check that logs directory exists
          if [ ! -d "logs" ]; then
            echo "❌ Logs directory missing"
            exit 1
          fi

          # 4. Check that at least one log file exists
          LOGFILE=$(ls logs/*.log | head -n 1)
          if [ -z "$LOGFILE" ]; then
            echo "❌ No log files found"
            exit 1
          fi

          # 5. Validate JSON structure of each log line
          while IFS= read -r line; do
            echo "$line" | jq empty || {
              echo "❌ Invalid JSON log entry:"
              echo "$line"
              exit 1
            }
          done < "$LOGFILE"

          echo "✅ Logging validation passed"





      # -------------------------
      # FRONTEND
      # -------------------------
      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint frontend
        run: cd frontend && npm run lint

      - name: Build frontend
        run: cd frontend && npm run build

      
      # -------------------------
      # SECURITY — Dependency Scan
      # -------------------------
      - name: Install OSV Scanner
        run: |
          curl -sSL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 \
            -o osv-scanner
          chmod +x osv-scanner

      - name: Run OSV dependency vulnerability scan
        run: ./osv-scanner --recursive . --severity=CRITICAL || true


      # -------------------------
      # SECURITY
      # -------------------------

      - name: Check for secrets
        if: github.event_name == 'push'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
